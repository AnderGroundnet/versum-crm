  onFinPeriodoPreset() {
    const preset = document.getElementById('finPeriodoPreset').value;
    const customDiv = document.getElementById('finPeriodoCustom');
    customDiv.style.display = preset === 'personalizado' ? 'flex' : 'none';
  }

  getFinPeriodoRango() {
    const preset = document.getElementById('finPeriodoPreset')?.value || 'mes_actual';
    const hoy = new Date();
    let desde = null, hasta = null, label = '';

    if (preset === 'mes_actual') {
      desde = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
      hasta = new Date(hoy.getFullYear(), hoy.getMonth() + 1, 0, 23, 59, 59);
      label = `${hoy.toLocaleString('es-ES', { month: 'long', year: 'numeric' })}`;
    } else if (preset === 'trimestre') {
      desde = new Date(hoy); desde.setMonth(desde.getMonth() - 3);
      hasta = new Date(hoy);
      label = 'Últimos 3 meses';
    } else if (preset === 'ano_actual') {
      desde = new Date(hoy.getFullYear(), 0, 1);
      hasta = new Date(hoy.getFullYear(), 11, 31, 23, 59, 59);
      label = `Año ${hoy.getFullYear()}`;
    } else if (preset === 'todo') {
      desde = null; hasta = null;
      label = 'Todo el histórico';
    } else if (preset === 'personalizado') {
      const desdeVal = document.getElementById('finDesde')?.value;
      const hastaVal = document.getElementById('finHasta')?.value;
      if (desdeVal) desde = new Date(desdeVal);
      if (hastaVal) { hasta = new Date(hastaVal); hasta.setHours(23, 59, 59); }
      label = desdeVal && hastaVal ? `${desdeVal} — ${hastaVal}` : 'Personalizado';
    }
    return { desde, hasta, label };
  }

  // filtroTipo se mantiene entre llamadas
  async loadFinanzas(filtroTipo = null) {
    // Mantener filtro de tipo activo
    if (filtroTipo !== null) this._finFiltroTipo = filtroTipo;
    const tipoActivo = this._finFiltroTipo || 'todas';

    try {
      const { desde, hasta, label } = this.getFinPeriodoRango();

      let query = supabaseClient.from('finanzas').select('*, comercial:usuarios!finanzas_comercial_id_fkey(nombre)').order('fecha', { ascending: false });
      if (this.currentUser.rol === 'comercial') query = query.eq('comercial_id', this.currentUser.id);
      if (desde) query = query.gte('fecha', desde.toISOString());
      if (hasta) query = query.lte('fecha', hasta.toISOString());

      const { data: finanzas, error } = await query;
      if (error) throw error;

      const todos = finanzas || [];
      const ingresos = todos.filter(f => f.tipo === 'ingreso').reduce((s, f) => s + parseFloat(f.monto || 0), 0);
      const gastos = todos.filter(f => f.tipo === 'gasto').reduce((s, f) => s + parseFloat(f.monto || 0), 0);

      // Actualizar KPIs con label del período
      const periodoShort = label ? `(${label})` : '';
      document.getElementById('totalIngresos').textContent = `€${ingresos.toFixed(2)}`;
      document.getElementById('totalGastos').textContent = `€${gastos.toFixed(2)}`;
      document.getElementById('balanceNeto').textContent = `€${(ingresos - gastos).toFixed(2)}`;
      ['periodoLabelIngresos','periodoLabelGastos','periodoLabelBalance'].forEach(id => {
        const el = document.getElementById(id); if (el) el.textContent = periodoShort;
      });
      const labelEl = document.getElementById('finPeriodoLabel');
      if (labelEl) labelEl.textContent = label ? `Mostrando: ${label}` : '';

      // Filtro tipo
      let filtradas = todos;
      if (tipoActivo === 'ingresos') filtradas = todos.filter(f => f.tipo === 'ingreso');
      if (tipoActivo === 'gastos') filtradas = todos.filter(f => f.tipo === 'gasto');

      // Botones activos
      document.querySelectorAll('[id^="filtro-fin-"]').forEach(btn => { btn.classList.remove('btn-blue'); btn.classList.add('btn-gray'); });
      const btnActivo = document.getElementById(`filtro-fin-${tipoActivo}`);
      if (btnActivo) { btnActivo.classList.remove('btn-gray'); btnActivo.classList.add('btn-blue'); }

      const container = document.getElementById('finanzasList');
      if (!filtradas.length) { container.innerHTML = `<p class="text-center text-gray-600 py-4">No hay movimientos en este período</p>`; }
      else {
        container.innerHTML = `
          <div style="max-height: 500px; overflow-y: auto;">
            ${filtradas.map(f => `
              <div class="mb-2" style="padding: 1rem; border-left: 4px solid ${f.tipo === 'ingreso' ? '#10b981' : '#ef4444'}; background: ${f.tipo === 'ingreso' ? '#f0fdf4' : '#fef2f2'}; border-radius: 8px;">
                <div class="flex justify-between" style="align-items: flex-start;">
                  <div style="flex: 1;">
                    <p class="font-bold" style="color: ${f.tipo === 'ingreso' ? '#065f46' : '#991b1b'};">${f.concepto}</p>
                    <div class="flex gap-2 mt-1" style="flex-wrap: wrap; font-size: 0.875rem; color: #6b7280;">
                      <span>📅 ${new Date(f.fecha).toLocaleDateString()}</span>
                      ${f.categoria ? `<span class="badge" style="background: white;">🏷️ ${this.getCategoriaLabel(f.categoria)}</span>` : ''}
                      ${this.currentUser.rol !== 'comercial' && f.comercial ? `<span class="badge" style="background: white;">👤 ${f.comercial.nombre}</span>` : ''}
                    </div>
                  </div>
                  <div class="flex gap-2" style="align-items: center;">
                    <p class="text-xl font-bold" style="color: ${f.tipo === 'ingreso' ? '#065f46' : '#991b1b'};">${f.tipo === 'ingreso' ? '+' : '-'}€${parseFloat(f.monto).toFixed(2)}</p>
                    ${(this.currentUser.rol === 'ceo' || this.currentUser.rol === 'admin') ? `<button onclick="app.deleteFinanza('${f.id}')" style="background: none; border: none; cursor: pointer; padding: 0.5rem; font-size: 1rem; color: #6b7280;">🗑️</button>` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
      }

      if (this.currentUser.rol !== 'comercial') this.loadComisiones();
    } catch (err) { console.error('Error cargando finanzas:', err); document.getElementById('finanzasList').innerHTML = `<p class="text-center" style="color: #ef4444;">Error cargando movimientos</p>`; }
  }

  filtrarTipoFinanza(tipo) { this.loadFinanzas(tipo); }

  async loadComisiones() {
    try {
      const { data: comConf } = await supabaseClient.from('comisiones_comerciales').select('*').eq('activo', true);
      if (!comConf || !comConf.length) { document.getElementById('comisionesList').innerHTML = `<p class="text-center text-gray-600">No hay comisiones configuradas</p>`; return; }
      const comisiones = await Promise.all(comConf.map(async (c) => {
        const { data: user } = await supabaseClient.from('usuarios').select('id, nombre').eq('id', c.comercial_id).single();
        const { data: pedidos } = await supabaseClient.from('pedidos').select('total').eq('comercial_id', c.comercial_id).eq('estado_facturacion', 'factura cobrada');
        const totalVentas = pedidos ? pedidos.reduce((sum, p) => sum + parseFloat(p.total || 0), 0) : 0;
        const comision = totalVentas * ((c.porcentaje || 0) / 100);
        return { nombre: user?.nombre || 'N/A', porcentaje: c.porcentaje || 0, ventas: totalVentas, comision };
      }));
      document.getElementById('comisionesList').innerHTML = `
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse;">
            <thead style="background: #f9fafb;"><tr><th style="padding:0.75rem; text-align:left;">Comercial</th><th style="padding:0.75rem; text-align:left;">%</th><th style="padding:0.75rem; text-align:left;">Ventas</th><th style="padding:0.75rem; text-align:left;">Comisión</th></tr></thead>
            <tbody style="border-top: 1px solid #e5e7eb;">
              ${comisiones.map(c => `<tr style="border-bottom: 1px solid #e5e7eb;"><td style="padding:0.75rem; font-weight:600;">${c.nombre}</td><td style="padding:0.75rem;">${c.porcentaje}%</td><td style="padding:0.75rem;">€${c.ventas.toFixed(2)}</td><td style="padding:0.75rem; font-weight:700; color:#D4A574;">€${c.comision.toFixed(2)}</td></tr>`).join('')}
              <tr style="background: #fef3c7; font-weight: 700;"><td colspan="3" style="padding:0.75rem; text-align:right;">TOTAL:</td><td style="padding:0.75rem; color:#92400e;">€${comisiones.reduce((sum, c) => sum + c.comision, 0).toFixed(2)}</td></tr>
            </tbody>
          </table>
        </div>
      `;
    } catch (err) { console.error('Error cargando comisiones:', err); }
  }

  getCategoriaLabel(categoria) {
    const labels = { ventas: 'Ventas', genero: 'Género', marketing: 'Marketing', transporte: 'Transporte', alquiler: 'Alquiler', servicios: 'Servicios', nominas: 'Nóminas', otros: 'Otros' };
    return labels[categoria] || categoria;
  }

  openModalFinanza() {
    document.getElementById('finanzaTipo').value = 'gasto';
    document.getElementById('finanzaConcepto').value = '';
    document.getElementById('finanzaMonto').value = '';
    document.getElementById('finanzaCategoria').value = '';
    document.getElementById('modalFinanza').classList.add('active');
  }

  closeModalFinanza() { document.getElementById('modalFinanza').classList.remove('active'); }

  async handleFinanzaSubmit(e) {
    e.preventDefault();
    const finanzaData = { tipo: document.getElementById('finanzaTipo').value, concepto: document.getElementById('finanzaConcepto').value, monto: parseFloat(document.getElementById('finanzaMonto').value), categoria: document.getElementById('finanzaCategoria').value || null, comercial_id: this.currentUser.id, fecha: new Date().toISOString() };
    try {
      const { error } = await supabaseClient.from('finanzas').insert([finanzaData]);
      if (error) throw error;
      showNotification(`✅ ${finanzaData.tipo === 'ingreso' ? 'Ingreso' : 'Gasto'} registrado`);
      this.closeModalFinanza();
      this.loadFinanzas();
    } catch (err) { console.error('Error registrando movimiento:', err); showNotification('❌ Error al registrar movimiento'); }
  }

  async deleteFinanza(id) {
    if (!confirm('¿Eliminar este movimiento?')) return;
    try {
      const { error } = await supabaseClient.from('finanzas').delete().eq('id', id);
      if (error) throw error;
      showNotification('✅ Movimiento eliminado');
      this.loadFinanzas();
    } catch (err) { console.error('Error eliminando movimiento:', err); showNotification('❌ Error al eliminar movimiento'); }
  }

  actualizarInputsPeriodo() {
    const tipo = document.getElementById('dashPeriodoTipo').value;
    const mesesDiv = document.getElementById('dashPeriodoMeses');
    const diasDiv = document.getElementById('dashPeriodoDias');
    if (tipo === 'meses') { mesesDiv.style.display = 'flex'; diasDiv.style.display = 'none'; }
    else {
      mesesDiv.style.display = 'none'; diasDiv.style.display = 'flex';
      if (!document.getElementById('dashDesde').value) {
        const hace30 = new Date(); hace30.setDate(hace30.getDate() - 30);
        document.getElementById('dashDesde').value = hace30.toISOString().split('T')[0];
        document.getElementById('dashHasta').value = new Date().toISOString().split('T')[0];
      }
    }
  }

  async loadDashboard() {
    try {
      const tipo = document.getElementById('dashPeriodoTipo')?.value || 'meses';
      const hoy = new Date();
      let startISO, endISO, buckets;

      if (tipo === 'dias') {
        const desde = document.getElementById('dashDesde')?.value;
        const hasta = document.getElementById('dashHasta')?.value;
        if (!desde || !hasta) { showNotification('❌ Selecciona rango de fechas'); return; }
        startISO = new Date(desde).toISOString();
        endISO = new Date(new Date(hasta).setHours(23,59,59,999)).toISOString();
        buckets = [];
        const d = new Date(desde);
        const end = new Date(hasta);
        while (d <= end) {
          buckets.push({ key: d.toISOString().split('T')[0], label: d.toLocaleDateString('es-ES', { day:'numeric', month:'short' }), total: 0, count: 0 });
          d.setDate(d.getDate() + 1);
        }
      } else {
        const numMeses = parseInt(document.getElementById('dashNumMeses')?.value || '6', 10);
        const start = new Date(hoy.getFullYear(), hoy.getMonth() - (numMeses - 1), 1);
        startISO = start.toISOString();
        endISO = hoy.toISOString();
        buckets = [];
        for (let i = numMeses - 1; i >= 0; i--) {
          const d = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
          const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          buckets.push({ key, label: d.toLocaleString('es-ES', { month: 'short', year: 'numeric' }), total: 0, count: 0 });
        }
      }

      const { data: pedidos } = await supabaseClient.from('pedidos').select('fecha, total, estado_facturacion, comercial_id').gte('fecha', startISO).lte('fecha', endISO);
      let ventasTotales = 0, pedidosTotales = 0, pedidosCobrados = 0;

      (pedidos || []).forEach(p => {
        const d = new Date(p.fecha);
        let bucket;
        if (tipo === 'dias') {
          const key = d.toISOString().split('T')[0];
          bucket = buckets.find(b => b.key === key);
        } else {
          const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          bucket = buckets.find(b => b.key === key);
        }
        if (bucket) { bucket.total += parseFloat(p.total || 0); bucket.count += 1; }
        ventasTotales += parseFloat(p.total || 0);
        pedidosTotales++;
        if (p.estado_facturacion === 'factura cobrada') pedidosCobrados++;
      });

      document.getElementById('kpiVentasTotales').textContent = `€${ventasTotales.toFixed(2)}`;
      document.getElementById('kpiPedidosTotales').textContent = `${pedidosTotales}`;
      document.getElementById('kpiPedidosCobrados').textContent = `${pedidosCobrados}`;
      document.getElementById('kpiAvgTicket').textContent = `€${(pedidosTotales ? ventasTotales / pedidosTotales : 0).toFixed(2)}`;

      const ctxV = document.getElementById('chartVentas').getContext('2d');
      if (this.chartVentas) this.chartVentas.destroy();
      this.chartVentas = new Chart(ctxV, { type: 'line', data: { labels: buckets.map(b => b.label), datasets: [{ label: 'Ventas (€)', data: buckets.map(b => b.total.toFixed(2)), borderColor: '#D4A574', backgroundColor: 'rgba(212,165,116,0.1)', tension: 0.3 }] } });

      const ctxP = document.getElementById('chartPedidos').getContext('2d');
      if (this.chartPedidos) this.chartPedidos.destroy();
      this.chartPedidos = new Chart(ctxP, { type: 'line', data: { labels: buckets.map(b => b.label), datasets: [{ label: 'Pedidos', data: buckets.map(b => b.count), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.08)', tension: 0.3 }] } });

      const { data: comerciales } = await supabaseClient.from('usuarios').select('id, nombre').eq('rol', 'comercial').eq('activo', true);
      const ventasPorComercial = await Promise.all((comerciales || []).map(async (u) => {
        const { data: ventas } = await supabaseClient.from('pedidos').select('total').eq('comercial_id', u.id).eq('estado_facturacion', 'factura cobrada').gte('fecha', startISO).lte('fecha', endISO);
        const total = ventas ? ventas.reduce((s, v) => s + parseFloat(v.total || 0), 0) : 0;
        return { nombre: u.nombre, total };
      }));
      const top = ventasPorComercial.sort((a,b) => b.total - a.total).slice(0,5);
      document.getElementById('kpiTopComercialesList').innerHTML = top.map(t => `<div style="display:flex; justify-content:space-between; padding:0.25rem 0;"><span>${t.nombre}</span><span style="font-weight:700;">€${t.total.toFixed(2)}</span></div>`).join('') || '<p class="text-gray-600">Sin datos</p>';

    } catch (err) { console.error('Error cargando dashboard:', err); document.getElementById('kpiTopComercialesList').innerHTML = '<p class="text-center text-gray-600">Error cargando datos</p>'; }
  }

  async loadFacturacion() {
    try {
      const desde = document.getElementById('factDesde').value;
      const hasta = document.getElementById('factHasta').value;
      const estadoFiltro = document.getElementById('factEstadoFiltro').value;

      let query = supabaseClient
        .from('pedidos')
        .select('id, fecha, total, descuento_total, estado_facturacion, cliente:clientes(id,nombre), comercial:usuarios!pedidos_comercial_id_fkey(nombre)')
        .order('fecha', { ascending: false })
        .limit(500);

      if (desde) query = query.gte('fecha', new Date(desde).toISOString());
      if (hasta) query = query.lte('fecha', new Date(new Date(hasta).setHours(23,59,59,999)).toISOString());
      if (estadoFiltro) query = query.eq('estado_facturacion', estadoFiltro);

      const { data: pedidos, error } = await query;
      if (error) throw error;

      const estadosConteo = {
        'pendiente de emitir factura': { label: 'Pendiente de emitir', count: 0, total: 0, color: '#ef4444', bg: '#fef2f2' },
        'factura emitida': { label: 'Emitida', count: 0, total: 0, color: '#f59e0b', bg: '#fef3c7' },
        'factura enviada': { label: 'Enviada', count: 0, total: 0, color: '#3b82f6', bg: '#dbeafe' },
        'factura cobrada': { label: 'Cobrada', count: 0, total: 0, color: '#10b981', bg: '#d1fae5' },
      };
      (pedidos || []).forEach(p => { const e = estadosConteo[p.estado_facturacion]; if (e) { e.count++; e.total += parseFloat(p.total || 0); } });
      document.getElementById('facturacionResumen').innerHTML = Object.entries(estadosConteo).map(([key, e]) => `
        <div class="card" style="border-left: 4px solid ${e.color}; background: ${e.bg}; cursor:pointer;" onclick="document.getElementById('factEstadoFiltro').value='${key}'; app.loadFacturacion();">
          <p style="font-size:0.875rem; font-weight:600; color:${e.color};">${e.label}</p>
          <p style="font-size:1.5rem; font-weight:700; margin-top:0.25rem;">${e.count} pedidos</p>
          <p style="font-size:1rem; color:${e.color}; font-weight:600;">€${e.total.toFixed(2)}</p>
        </div>
      `).join('');

      const container = document.getElementById('facturacionList');
      if (!pedidos || !pedidos.length) { container.innerHTML = `<div class="card text-center py-8"><p class="text-gray-600">No hay pedidos con este filtro</p></div>`; return; }

      container.innerHTML = `
        <div style="overflow-x:auto;">
          <table style="width:100%; border-collapse: collapse;">
            <thead style="background:#f9fafb;">
              <tr>
                <th style="padding:0.75rem; text-align:left;">Fecha</th>
                <th style="padding:0.75rem; text-align:left;">Cliente</th>
                <th style="padding:0.75rem; text-align:right;">Total</th>
                <th style="padding:0.75rem; text-align:right;">Descuento</th>
                <th style="padding:0.75rem; text-align:left;">Estado facturación</th>
              </tr>
            </thead>
            <tbody>
              ${(pedidos || []).map(p => {
                const estadoColors = { 'pendiente de emitir factura': '#fee2e2', 'factura emitida': '#fef3c7', 'factura enviada': '#dbeafe', 'factura cobrada': '#d1fae5' };
                const rowBg = estadoColors[p.estado_facturacion] || 'transparent';
                return `
                  <tr style="border-top:1px solid #e5e7eb; background:${rowBg}">
                    <td style="padding:0.75rem;">${new Date(p.fecha).toLocaleDateString()}</td>
                    <td style="padding:0.75rem; font-weight:600;">${p.cliente?.nombre || 'N/A'}</td>
                    <td style="padding:0.75rem; text-align:right; font-weight:700;">€${parseFloat(p.total || 0).toFixed(2)}</td>
                    <td style="padding:0.75rem; text-align:right;">€${parseFloat(p.descuento_total || 0).toFixed(2)}</td>
                    <td style="padding:0.75rem;">
                      <select onchange="app.updatePedidoFacturacion('${p.id}', this.value)" style="padding:0.4rem; border-radius:6px; border:1px solid #d1d5db;">
                        <option value="pendiente de emitir factura" ${p.estado_facturacion === 'pendiente de emitir factura' ? 'selected' : ''}>Pendiente de emitir</option>
                        <option value="factura emitida" ${p.estado_facturacion === 'factura emitida' ? 'selected' : ''}>Emitida</option>
                        <option value="factura enviada" ${p.estado_facturacion === 'factura enviada' ? 'selected' : ''}>Enviada</option>
                        <option value="factura cobrada" ${p.estado_facturacion === 'factura cobrada' ? 'selected' : ''}>Cobrada</option>
                      </select>
                    </td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch (err) { console.error('Error cargando facturación:', err); document.getElementById('facturacionList').innerHTML = `<div class="card text-center py-8"><p style="color:#ef4444;">Error cargando datos</p></div>`; }

  async exportFacturacionToExcel() {

  getRolBadgeColor(rol) { const colors = { ceo: 'badge badge-orange', admin: 'badge badge-green', comercial: 'badge badge-blue' }; return colors[rol] || 'badge badge-blue'; }
  getRolLabel(rol) { const labels = { ceo: '👑 CEO', admin: '⚙️ Admin', comercial: '💼 Comercial' }; return labels[rol] || rol; }

  openModalUsuario(usuario = null) {
    this.editingUsuario = usuario;
    const title = document.getElementById('modalUsuarioTitle');
    const btn = document.getElementById('btnGuardarUsuario');
    if (usuario) {
      title.textContent = 'Editar Usuario'; btn.textContent = 'Actualizar Usuario';
      document.getElementById('usuarioNombre').value = usuario.nombre || '';
      document.getElementById('usuarioEmail').value = usuario.email || '';
      document.getElementById('usuarioPassword').value = '';
      document.getElementById('usuarioPassword').placeholder = 'Dejar en blanco para no cambiar';
      document.getElementById('usuarioPassword').required = false;
      document.getElementById('usuarioRol').value = usuario.rol || 'comercial';
      document.getElementById('usuarioComision').value = usuario.comision_porcentaje || 0;
      document.getElementById('usuarioActivo').checked = usuario.activo !== false;
    } else {
      title.textContent = 'Nuevo Usuario'; btn.textContent = 'Guardar Usuario';
      document.getElementById('usuarioNombre').value = '';
      document.getElementById('usuarioEmail').value = '';
      document.getElementById('usuarioPassword').value = '';
      document.getElementById('usuarioPassword').placeholder = 'Mínimo 6 caracteres';
      document.getElementById('usuarioPassword').required = true;
      document.getElementById('usuarioRol').value = 'comercial';
      document.getElementById('usuarioComision').value = 0;
      document.getElementById('usuarioActivo').checked = true;
    }
    this.updateComisionField();
    document.getElementById('modalUsuario').classList.add('active');
  }

  closeModalUsuario() { document.getElementById('modalUsuario').classList.remove('active'); this.editingUsuario = null; }

  updateComisionField() {
    const rol = document.getElementById('usuarioRol').value;
    document.getElementById('comisionField').style.display = rol === 'comercial' ? 'block' : 'none';
    if (rol !== 'comercial') document.getElementById('usuarioComision').value = 0;
  }

  async handleUsuarioSubmit(e) {
    e.preventDefault();
    const usuarioData = { nombre: document.getElementById('usuarioNombre').value, email: document.getElementById('usuarioEmail').value, rol: document.getElementById('usuarioRol').value, activo: document.getElementById('usuarioActivo').checked, comision_porcentaje: parseFloat(document.getElementById('usuarioComision').value) || 0 };
    const password = document.getElementById('usuarioPassword').value;
    try {
      if (this.editingUsuario) {
        const updateData = { ...usuarioData };
       if (password) updateData.password_hash = await bcrypt.hash(password, 10);
        const { error } = await supabaseClient.from('usuarios').update(updateData).eq('id', this.editingUsuario.id);
        if (error) throw error;
        showNotification('✅ Usuario actualizado');
        if (this.editingUsuario.id === this.currentUser.id) { this.currentUser = { ...this.currentUser, ...usuarioData }; localStorage.setItem('versum_user', JSON.stringify(this.currentUser)); }
      } else {
        usuarioData.password_hash = await bcrypt.hash(password, 10);
        usuarioData.created_at = new Date().toISOString();
        const { error } = await supabaseClient.from('usuarios').insert([usuarioData]);
        if (error) { if (error.code === '23505') { showNotification('❌ Email ya registrado'); return; } throw error; }
        showNotification('✅ Usuario creado');
      }
      this.closeModalUsuario(); this.loadUsuarios(); await this.loadComerciales();
    } catch (err) { console.error('Error guardando usuario:', err); showNotification('❌ Error al guardar usuario'); }
  }

  async editUsuario(id) {
    try {
      const { data, error } = await supabaseClient.from('usuarios').select('*').eq('id', id).single();
      if (error) throw error;
      this.openModalUsuario(data);
    } catch (err) { console.error('Error cargando usuario:', err); showNotification('❌ Error al cargar usuario'); }
  }

  async toggleUsuarioActivo(id, activo) {
    if (!confirm(`¿Seguro que quieres ${activo ? 'desactivar' : 'activar'} este usuario?`)) return;
    try {
      const { error } = await supabaseClient.from('usuarios').update({ activo: !activo }).eq('id', id);
      if (error) throw error;
      showNotification(`✅ Usuario ${activo ? 'desactivado' : 'activado'}`); this.loadUsuarios(); await this.loadComerciales();
    } catch (err) { console.error('Error actualizando usuario:', err); showNotification('❌ Error al actualizar usuario'); }
  }

  openModalResetPassword(id, nombre) {
    this.resetPasswordUserId = id;
    document.getElementById('resetPasswordNombre').textContent = nombre;
    document.getElementById('resetPasswordNueva').value = '';
    document.getElementById('modalResetPassword').classList.add('active');
  }

  closeModalResetPassword() { document.getElementById('modalResetPassword').classList.remove('active'); this.resetPasswordUserId = null; }

  async handleResetPasswordSubmit(e) {
    e.preventDefault();
    const nuevaPassword = document.getElementById('resetPasswordNueva').value;
    try {
      const hashedPassword = await bcrypt.hash(nuevaPassword, 10);
const { error } = await supabaseClient.from('usuarios').update({ password_hash: hashedPassword }).eq('id', this.resetPasswordUserId);
      if (error) throw error;
      showNotification('✅ Contraseña reseteada'); this.closeModalResetPassword();
    } catch (err) { console.error('Error reseteando contraseña:', err); showNotification('❌ Error al resetear contraseña'); }
  }
}

let app;
window.addEventListener('load', () => {
  app = new VersumCRM();
});
  </script>
</body>
